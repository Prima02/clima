<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=256,height=512,initial-scale=1.0"/>
<title>PrimaPay Clima</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    width:256px;
    height:512px;
    overflow:hidden;
    background: linear-gradient(180deg,#5b14ff,#18004d);
    color:white;
}

.container{
    width:100%;
    height:100%;
    padding:16px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.logo{
    text-align:center;
    font-size:30px;
    font-weight:bold;
    margin-top:5px;
}

.subtitle{
    text-align:center;
    font-size:10px;
    opacity:0.8;
    margin-top:-3px;
}

.clock{
    text-align:center;
    margin-top:15px;
}

.time{
    font-size:42px;
    font-weight:bold;
}

.date{
    font-size:14px;
    opacity:0.9;
}

.weather{
    text-align:center;
}

.icon{
    font-size:70px;
    margin-bottom:10px;
}

.temp{
    font-size:56px;
    font-weight:bold;
}

.city{
    font-size:18px;
    margin-top:5px;
}

.condition{
    font-size:16px;
    opacity:0.9;
    margin-top:6px;
}

.footer{
    text-align:center;
    margin-bottom:10px;
}

.minmax{
    font-size:18px;
    margin-bottom:12px;
}

.brand{
    font-size:14px;
    opacity:0.85;
}
</style>
</head>

<body>

<div class="container">

    <div>
        <div class="logo">Prima</div>
        <div class="subtitle">VOCÊ UM PASSO À FRENTE.</div>

        <div class="clock">
            <div class="time" id="time">00:00</div>
            <div class="date" id="date">Carregando...</div>
        </div>
    </div>

    <div class="weather">
        <div class="icon" id="icon">☀️</div>
        <div class="temp" id="temp">--°</div>
        <div class="city">Ouro Preto</div>
        <div class="condition" id="condition">Carregando clima...</div>
    </div>

    <div class="footer">
        <div class="minmax" id="minmax">Mín --° | Máx --°</div>
        <div class="brand">PrimaPay Clima</div>
    </div>

</div>

<script>

// RELÓGIO
function updateClock(){
    const now = new Date();

    const time = now.toLocaleTimeString('pt-BR',{
        hour:'2-digit',
        minute:'2-digit'
    });

    const date = now.toLocaleDateString('pt-BR',{
        weekday:'long',
        day:'2-digit',
        month:'long'
    });

    document.getElementById('time').innerText = time;
    document.getElementById('date').innerText = date;
}

setInterval(updateClock,1000);
updateClock();


// CLIMA
async function getWeather(){

    try{

        // API GRATUITA
        const url = "https://api.open-meteo.com/v1/forecast?latitude=-20.3856&longitude=-43.5036&current_weather=true&daily=temperature_2m_max,temperature_2m_min&timezone=America/Sao_Paulo";

        const response = await fetch(url);
        const data = await response.json();

        const temp = Math.round(data.current_weather.temperature);

        const weatherCode = data.current_weather.weathercode;

        const max = Math.round(data.daily.temperature_2m_max[0]);
        const min = Math.round(data.daily.temperature_2m_min[0]);

        let icon = "☀️";
        let condition = "Ensolarado";

        // CÓDIGOS CLIMA
        if([1,2].includes(weatherCode)){
            icon = "🌤️";
            condition = "Parcialmente nublado";
        }

        if([3].includes(weatherCode)){
            icon = "☁️";
            condition = "Nublado";
        }

        if([45,48].includes(weatherCode)){
            icon = "🌫️";
            condition = "Neblina";
        }

        if([51,53,55,61,63,65,80,81,82].includes(weatherCode)){
            icon = "🌧️";
            condition = "Chuva";
        }

        if([95,96,99].includes(weatherCode)){
            icon = "⛈️";
            condition = "Tempestade";
        }

        document.getElementById('temp').innerText = temp + "°";
        document.getElementById('condition').innerText = condition;
        document.getElementById('icon').innerText = icon;
        document.getElementById('minmax').innerText =
            "Mín " + min + "° | Máx " + max + "°";

    }catch(error){

        document.getElementById('condition').innerText =
            "Sem conexão";

    }

}

getWeather();

// Atualiza a cada 10 minutos
setInterval(getWeather,600000);

</script>

</body>
</html>
