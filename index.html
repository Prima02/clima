<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=256,height=512,initial-scale=1.0">
<title>PrimaPay Clima</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

html,body{
    width:256px;
    height:512px;
    overflow:hidden;
}

body{
    position:relative;
    color:#fff;
}

/* BACKGROUND */
body::before{
    content:'';
    position:absolute;
    inset:0;

    background:url('background.jpg') center center/cover no-repeat;

    z-index:-3;
}

/* Escurecimento leve */
body::after{
    content:'';
    position:absolute;
    inset:0;

    background:linear-gradient(
        to bottom,
        rgba(0,0,0,.05),
        rgba(0,0,0,.18)
    );

    z-index:-2;
}

/* LAYOUT */
.container{
    width:100%;
    height:100%;

    display:flex;
    flex-direction:column;

    padding:10px 8px 8px;
}

/* LOGO */
.logo-container{
    display:flex;
    justify-content:center;
    align-items:center;

    margin-top:4px;
    margin-bottom:10px;

    flex-shrink:0;
}

.logo-img{
    width:145px;
    height:auto;
    object-fit:contain;
}

/* CARD GLASS */
.card{

    flex:1;

    border-radius:22px;

    background:
        linear-gradient(
            180deg,
            rgba(255,255,255,.18),
            rgba(255,255,255,.08)
        );

    border:1px solid rgba(255,255,255,.35);

    backdrop-filter:blur(22px);
    -webkit-backdrop-filter:blur(22px);

    box-shadow:
        inset 0 1px 0 rgba(255,255,255,.35),
        0 10px 30px rgba(0,0,0,.15);

    display:flex;
    flex-direction:column;
    justify-content:space-between;

    padding:22px 18px;
}

/* CLOCK */
.clock{
    text-align:center;
}

.time{
    font-size:72px;
    line-height:1;
    font-weight:800;
    letter-spacing:-2px;
}

.date{
    margin-top:12px;

    font-size:10px;
    font-weight:500;

    opacity:.95;
}

/* DIVIDERS */
.divider{
    width:72%;
    height:1px;

    margin:0 auto;

    background:rgba(255,255,255,.20);
}

/* WEATHER */
.weather{
    text-align:center;
}

.icon{
    font-size:62px;
    margin-bottom:14px;
}

.temp{
    font-size:86px;
    line-height:1;
    font-weight:800;
}

.city{
    margin-top:14px;

    font-size:22px;
    font-weight:700;
}

.condition{
    margin-top:10px;

    font-size:16px;
    font-weight:500;

    opacity:.95;
}

/* FOOTER */
.footer{
    text-align:center;
}

.minmax{
    font-size:22px;
    font-weight:600;
}

.brand{
    margin-top:16px;

    font-size:10px;
    font-weight:500;

    opacity:.75;
}

</style>
</head>

<body>

<div class="container">

    <!-- LOGO -->
    <div class="logo-container">
        <img src="logo.png" alt="Prima" class="logo-img">
    </div>

    <!-- CARD -->
    <div class="card">

        <!-- HORA -->
        <div class="clock">
            <div class="time" id="time">11:39</div>
            <div class="date" id="date">
                Sexta-Feira, 22 De Maio
            </div>
        </div>

        <div class="divider"></div>

        <!-- CLIMA -->
        <div class="weather">

            <div class="icon" id="icon">
                ☁️
            </div>

            <div class="temp" id="temp">
                17°
            </div>

            <div class="city">
                Ouro Preto
            </div>

            <div class="condition" id="condition">
                Nublado
            </div>

        </div>

        <div class="divider"></div>

        <!-- RODAPÉ -->
        <div class="footer">

            <div class="minmax" id="minmax">
                Mín 13° | Máx 17°
            </div>

            <div class="brand">
                PrimaPay Clima
            </div>

        </div>

    </div>

</div>

<script>

/* RELÓGIO */
function updateClock(){

    const now = new Date();

    document.getElementById('time').innerText =
        now.toLocaleTimeString('pt-BR',{
            hour:'2-digit',
            minute:'2-digit'
        });

    const date =
        now.toLocaleDateString('pt-BR',{
            weekday:'long',
            day:'2-digit',
            month:'long'
        });

    document.getElementById('date').innerText =
        date.replace(/^\w/, c => c.toUpperCase());
}

setInterval(updateClock,1000);
updateClock();


/* CLIMA */
async function getWeather(){

    try{

        const response = await fetch(
            "https://api.open-meteo.com/v1/forecast?latitude=-20.3856&longitude=-43.5036&current_weather=true&daily=temperature_2m_max,temperature_2m_min&timezone=America/Sao_Paulo"
        );

        const data = await response.json();

        const temp =
            Math.round(data.current_weather.temperature);

        const code =
            data.current_weather.weathercode;

        const max =
            Math.round(data.daily.temperature_2m_max[0]);

        const min =
            Math.round(data.daily.temperature_2m_min[0]);

        let icon = "☀️";
        let condition = "Ensolarado";

        if([1,2].includes(code)){
            icon="🌤️";
            condition="Parcialmente nublado";
        }

        if(code===3){
            icon="☁️";
            condition="Nublado";
        }

        if([45,48].includes(code)){
            icon="🌫️";
            condition="Neblina";
        }

        if([51,53,55,61,63,65,80,81,82].includes(code)){
            icon="🌧️";
            condition="Chuva";
        }

        if([95,96,99].includes(code)){
            icon="⛈️";
            condition="Tempestade";
        }

        document.getElementById('icon').innerText = icon;
        document.getElementById('temp').innerText = temp + "°";
        document.getElementById('condition').innerText = condition;

        document.getElementById('minmax').innerText =
            `Mín ${min}° | Máx ${max}°`;

    }catch(e){

        document.getElementById('condition').innerText =
            "Sem conexão";

    }
}

getWeather();
setInterval(getWeather,600000);

</script>

</body>
</html>
