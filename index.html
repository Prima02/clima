<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=256,height=512,initial-scale=1.0">

<title>PrimaPay Clima</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    width:256px;
    height:512px;
    overflow:hidden;
    color:#fff;
    position:relative;
}

/* Imagem de fundo */
body::before{
    content:'';
    position:absolute;
    inset:0;

    background:url('background.jpg') center center/cover no-repeat;

    z-index:-2;
}

/* Escurecimento suave */
body::after{
    content:'';
    position:absolute;
    inset:0;

    background:rgba(0,0,0,.12);

    z-index:-1;
}

.container{
    width:100%;
    height:100%;
    padding:10px 8px;

    display:flex;
    flex-direction:column;
}

/* Logo */
.logo-container{
    display:flex;
    justify-content:center;
    align-items:center;

    margin-top:4px;
    margin-bottom:8px;
}

.logo-img{
    width:145px;
    height:auto;
    object-fit:contain;
}

/* Card Glass */
.card{

    flex:1;

    border-radius:22px;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);

    border:1px solid rgba(255,255,255,.25);

    display:flex;
    flex-direction:column;
    justify-content:space-between;

    padding:18px 16px;
}

/* Hora */
.clock{
    text-align:center;
}

.time{
    font-size:52px;
    font-weight:800;
    line-height:1;
}

.date{
    margin-top:8px;

    font-size:10px;
    font-weight:500;

    opacity:.95;
}

/* Linhas divisórias */
.divider{
    width:80%;
    height:1px;

    background:rgba(255,255,255,.18);

    margin:0 auto;
}

/* Clima */
.weather{
    text-align:center;
}

.icon{
    font-size:64px;
    margin-bottom:10px;
}

.temp{
    font-size:72px;
    font-weight:800;
    line-height:1;
}

.city{
    margin-top:14px;

    font-size:20px;
    font-weight:700;
}

.condition{
    margin-top:8px;

    font-size:16px;
    font-weight:500;

    opacity:.95;
}

/* Rodapé */
.footer{
    text-align:center;
}

.minmax{
    font-size:18px;
    font-weight:700;
}

.brand{
    margin-top:14px;

    font-size:12px;
    font-weight:500;

    opacity:.75;
}

</style>
</head>

<body>

<div class="container">

    <!-- LOGO -->
    <div class="logo-container">
        <img src="logo.png" alt="PrimaPay" class="logo-img">
    </div>

    <!-- CARD -->
    <div class="card">

        <!-- RELÓGIO -->
        <div class="clock">
            <div class="time" id="time">00:00</div>
            <div class="date" id="date">Carregando...</div>
        </div>

        <div class="divider"></div>

        <!-- CLIMA -->
        <div class="weather">

            <div class="icon" id="icon">☁️</div>

            <div class="temp" id="temp">--°</div>

            <div class="city">
                Ouro Preto
            </div>

            <div class="condition" id="condition">
                Carregando clima...
            </div>

        </div>

        <div class="divider"></div>

        <!-- RODAPÉ -->
        <div class="footer">

            <div class="minmax" id="minmax">
                Mín --° | Máx --°
            </div>

            <div class="brand">
                PrimaPay Clima
            </div>

        </div>

    </div>

</div>

<script>

// RELÓGIO
function updateClock(){

    const now = new Date();

    const time = now.toLocaleTimeString('pt-BR',{
        hour:'2-digit',
        minute:'2-digit'
    });

    const date = now.toLocaleDateString('pt-BR',{
        weekday:'long',
        day:'2-digit',
        month:'long'
    });

    document.getElementById('time').innerText = time;

    document.getElementById('date').innerText =
        date.replace(/^\w/, c => c.toUpperCase());

}

setInterval(updateClock,1000);
updateClock();


// CLIMA
async function getWeather(){

    try{

        const url =
        "https://api.open-meteo.com/v1/forecast?latitude=-20.3856&longitude=-43.5036&current_weather=true&daily=temperature_2m_max,temperature_2m_min&timezone=America/Sao_Paulo";

        const response = await fetch(url);

        const data = await response.json();

        const temp =
            Math.round(data.current_weather.temperature);

        const weatherCode =
            data.current_weather.weathercode;

        const max =
            Math.round(data.daily.temperature_2m_max[0]);

        const min =
            Math.round(data.daily.temperature_2m_min[0]);

        let icon = "☀️";
        let condition = "Ensolarado";

        if([1,2].includes(weatherCode)){
            icon = "🌤️";
            condition = "Parcialmente nublado";
        }

        if([3].includes(weatherCode)){
            icon = "☁️";
            condition = "Nublado";
        }

        if([45,48].includes(weatherCode)){
            icon = "🌫️";
            condition = "Neblina";
        }

        if([51,53,55,61,63,65,80,81,82].includes(weatherCode)){
            icon = "🌧️";
            condition = "Chuva";
        }

        if([95,96,99].includes(weatherCode)){
            icon = "⛈️";
            condition = "Tempestade";
        }

        document.getElementById('temp').innerText =
            temp + "°";

        document.getElementById('condition').innerText =
            condition;

        document.getElementById('icon').innerText =
            icon;

        document.getElementById('minmax').innerText =
            "Mín " + min + "° | Máx " + max + "°";

    }
    catch(error){

        document.getElementById('condition').innerText =
            "Sem conexão";

    }

}

getWeather();

// Atualiza a cada 10 minutos
setInterval(getWeather,600000);

</script>

</body>
</html>
