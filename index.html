<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=256,height=512,initial-scale=1.0">

<title>PrimaPay Clima</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:256px;
    height:512px;
    overflow:hidden;
}

body{
    position:relative;
    font-family:'Inter',sans-serif;
    color:#ffffff;
}

/* Fundo */
body::before{
    content:'';
    position:absolute;
    inset:0;

    background:
        url('background.jpg')
        center center / cover no-repeat;

    z-index:-3;
}

/* Overlay suave */
body::after{
    content:'';
    position:absolute;
    inset:0;

    background:
        linear-gradient(
            180deg,
            rgba(0,0,0,.02),
            rgba(0,0,0,.12)
        );

    z-index:-2;
}

/* Container */
.container{
    width:100%;
    height:100%;

    display:flex;
    flex-direction:column;

    padding:14px;
}

/* Logo */
.logo-container{
    display:flex;
    justify-content:center;
    align-items:center;

    margin-bottom:18px;
}

.logo-img{
    width:105px;
    height:auto;
    object-fit:contain;
}

/* Card Glass */
.card{

    flex:1;

    display:flex;
    flex-direction:column;
    justify-content:space-between;

    padding:24px 22px;

    border-radius:28px;

    background:
        rgba(255,255,255,.08);

    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.28);

    box-shadow:
        inset 0 1px 0 rgba(255,255,255,.20);
}

/* Hora */
.clock{
    text-align:center;
}

.time{
    font-size:56px;
    font-weight:800;
    line-height:1;
    letter-spacing:-2px;
}

.date{
    margin-top:10px;

    font-size:9px;
    font-weight:400;

    opacity:.92;

    letter-spacing:.4px;
}

/* Linhas */
.divider{
    width:72%;
    height:1px;

    margin:0 auto;

    background:
        rgba(255,255,255,.16);
}

/* Clima */
.weather{
    text-align:center;
}

.icon{
    font-size:54px;
    margin-bottom:14px;
}

.temp{
    font-size:68px;
    font-weight:800;
    line-height:1;
}

.city{
    margin-top:16px;

    font-size:12px;
    font-weight:400;

    letter-spacing:.3px;
}

.condition{
    margin-top:8px;

    font-size:10px;
    font-weight:300;

    opacity:.9;
}

/* Rodapé */
.footer{
    text-align:center;
}

.minmax{
    font-size:9px;
    font-weight:300;

    letter-spacing:.8px;
    text-transform:lowercase;
}

.brand{
    margin-top:18px;

    font-size:8px;
    font-weight:300;

    opacity:.7;

    letter-spacing:1px;
}

</style>
</head>

<body>

<div class="container">

    <!-- LOGO -->
    <div class="logo-container">
        <img src="logo.png" alt="Prima" class="logo-img">
    </div>

    <!-- CARD -->
    <div class="card">

        <!-- RELÓGIO -->
        <div class="clock">
            <div class="time" id="time">11:39</div>
            <div class="date" id="date">sexta-feira, 22 de maio</div>
        </div>

        <div class="divider"></div>

        <!-- CLIMA -->
        <div class="weather">

            <div class="icon" id="icon">☁️</div>

            <div class="temp" id="temp">17°</div>

            <div class="city">
                Ouro Preto
            </div>

            <div class="condition" id="condition">
                Nublado
            </div>

        </div>

        <div class="divider"></div>

        <!-- RODAPÉ -->
        <div class="footer">

            <div class="minmax" id="minmax">
                mín 13° &nbsp;&nbsp;&nbsp; | &nbsp;&nbsp;&nbsp; máx 17°
            </div>

            <div class="brand">
                PrimaPay Clima
            </div>

        </div>

    </div>

</div>

<script>

/* RELÓGIO */
function updateClock(){

    const now = new Date();

    document.getElementById('time').innerText =
        now.toLocaleTimeString('pt-BR',{
            hour:'2-digit',
            minute:'2-digit'
        });

    document.getElementById('date').innerText =
        now.toLocaleDateString('pt-BR',{
            weekday:'long',
            day:'2-digit',
            month:'long'
        });
}

setInterval(updateClock,1000);
updateClock();

/* CLIMA */
async function getWeather(){

    try{

        const response = await fetch(
            'https://api.open-meteo.com/v1/forecast?latitude=-20.3856&longitude=-43.5036&current_weather=true&daily=temperature_2m_max,temperature_2m_min&timezone=America/Sao_Paulo'
        );

        const data = await response.json();

        const temp =
            Math.round(data.current_weather.temperature);

        const code =
            data.current_weather.weathercode;

        const max =
            Math.round(data.daily.temperature_2m_max[0]);

        const min =
            Math.round(data.daily.temperature_2m_min[0]);

        let icon='☀️';
        let condition='Ensolarado';

        if([1,2].includes(code)){
            icon='🌤️';
            condition='Parcialmente nublado';
        }

        if(code===3){
            icon='☁️';
            condition='Nublado';
        }

        if([45,48].includes(code)){
            icon='🌫️';
            condition='Neblina';
        }

        if([51,53,55,61,63,65,80,81,82].includes(code)){
            icon='🌧️';
            condition='Chuva';
        }

        if([95,96,99].includes(code)){
            icon='⛈️';
            condition='Tempestade';
        }

        document.getElementById('icon').innerText =
            icon;

        document.getElementById('temp').innerText =
            temp + '°';

        document.getElementById('condition').innerText =
            condition;

        document.getElementById('minmax').innerText =
            `mín ${min}°   |   máx ${max}°`;

    }catch(error){

        document.getElementById('condition').innerText =
            'Sem conexão';

    }
}

getWeather();
setInterval(getWeather,600000);

</script>

</body>
</html>
